name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml

  test:
    name: Tests
    needs: verify
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  backend-compat:
    name: Backend Compatibility
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Repository
        uses: ./.github/actions/setup

      - name: Test Backend Compatibility
        run: pnpm test:backend-compat

  release:
    name: Publish Canary
    runs-on: ubuntu-latest
    needs:
      - verify
      - test
      - backend-compat

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Repository
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Version Packages For Canary
        run: pnpm version:canary

      - name: Publish Canary Packages
        run: pnpm release:canary

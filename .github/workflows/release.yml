name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml

  test:
    name: Tests
    needs: verify
    uses: ./.github/workflows/tests.yml

  integration-tests:
    name: Integration Tests
    needs: verify
    uses: ./.github/workflows/integration-tests.yml
    secrets: inherit

  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    needs:
      - verify
      - test
      # Temporarily do not block changesets while we solve the integration test runner issue.
      # - integration-tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Repository
        uses: ./.github/actions/setup

      - name: Create Or Update Beta Release PR
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm version:bump
          publish: pnpm release
          title: '[Release] Candidate'
          commit: 'chore: bumps package versions'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  canary:
    name: Publish Canary
    runs-on: ubuntu-latest
    needs:
      - verify
      - test
      # Temporarily do not block canary publishing while we solve the integration test runner issue.
      # - integration-tests
    if: "${{ !contains(github.event.head_commit.message, 'chore: bumps package versions') }}"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Repository
        uses: ./.github/actions/setup

      - name: Disable Beta Prerelease Mode For Canary
        run: mv .changeset/pre.json .changeset/pre.json.disabled

      - name: Version Packages For Canary
        run: pnpm version:canary

      - name: Build
        run: pnpm build

      - name: Publish Canary Packages
        run: pnpm release:canary

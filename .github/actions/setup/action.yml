name: Setup
description: Setup repo tooling and install dependencies

runs:
  using: composite
  steps:
    - name: Set Up pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      with:
        version: 10.33.0
        run_install: false

    - name: Set Up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
